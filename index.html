/* ================= SAVE ================= */
function save(){
localStorage.setItem("flowers",JSON.stringify(data));
}

/* ================= ADD ================= */
function add(){
let n=document.getElementById("name").value.trim();
let f=document.getElementById("flower").value.trim();
if(!n||!f) return alert("Nhập đủ");

if(!data[n]) data[n]=[];
data[n].push(f);

save();
render();
}

/* ================= DELETE ================= */
function del(n,f){
data[n]=data[n].filter(x=>x!==f);
if(data[n].length==0) delete data[n];
save();
render();
}

/* ================= EDIT ================= */
function edit(n,f){
let nf=prompt("Sửa:",f);
if(!nf) return;
data[n][data[n].indexOf(f)]=nf;
save();
render();
}

/* ================= RENDER (FIX SEARCH: hoa → chỉ ra người) ================= */
function render(){
let k=document.getElementById("search").value.toLowerCase();
let html="";

if(!k){
for(let n in data){
html+=`<div class="card"><div class="name">${n}</div>`;
data[n].forEach(f=>{
html+=`<div class="flower">
<span>${f}</span>
<div class="btns">
<button onclick="edit('${n}','${f}')">Sửa</button>
<button onclick="del('${n}','${f}')">Xoá</button>
</div>
</div>`;
});
html+="</div>";
}
}
else{
for(let n in data){
let hasName=n.toLowerCase().includes(k);
let hasFlower=data[n].some(f=>f.toLowerCase().includes(k));

if(hasName || hasFlower){
html+=`<div class="card"><div class="name">${n}</div></div>`;
}
}
}

document.getElementById("app").innerHTML=html;
}

render();

</script>
