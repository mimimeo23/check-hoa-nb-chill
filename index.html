function timKiem(){

const key = document.getElementById("search").value.trim().toLowerCase();
const info = document.getElementById("info");

if(key === ""){
info.innerHTML = "Nhập để tìm kiếm.";
return;
}

/* =========================
   1. TÌM THEO TÊN THÀNH VIÊN
========================= */
for(const m of members){
if(m.member.toLowerCase() === key){
info.innerHTML =
"👤 <b>" + m.member + "</b><br><br>" +
"📌 Số hoa: " + m.flowers.length + "<br><br>" +
"🌸 " + m.flowers.join("<br>");
return;
}
}

/* =========================
   2. TÌM THEO TÊN HOA
========================= */
let owners = [];

for(const m of members){
for(const f of m.flowers){
if(f.toLowerCase().includes(key)){
owners.push(m.member);
break;
}
}
}

if(owners.length > 0){
info.innerHTML =
"🌸 <b>Người có hoa:</b><br>" +
[...new Set(owners)].join("<br>");
return;
}

info.innerHTML = "❌ Không tìm thấy";
}
