/* ================= RENDER ================= */
function render(list){
let html="";
for(let name in list){
html+=`<div class="member"><b>${name}</b>`;
list[name].forEach(f=>{
html+=`<div class="flower" onclick="showOwner('${f}')">${f}</div>`;
});
html+="</div>";
}
document.getElementById("result").innerHTML=html;
}

/* ================= SEARCH ================= */
function searchData(){
let key=document.getElementById("search").value.toLowerCase();
let result={};

for(let name in data){
if(name.toLowerCase().includes(key)){
result[name]=data[name];
continue;
}

let match=data[name].filter(f=>f.toLowerCase().includes(key));
if(match.length>0){
result[name]=match;
}
}

render(result);
}

/* ================= CLICK ================= */
function showOwner(flower){
let owners=[];
for(let name in data){
if(data[name].includes(flower)){
owners.push(name);
}
}
alert("🌸 Hoa: "+flower+"\n👤 Thuộc về: "+owners.join(", "));
}

/* INIT */
render(data);
