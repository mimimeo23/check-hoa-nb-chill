<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoa NB</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffd6e0;
    padding:20px;
}

.box{
    background:white;
    max-width:800px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#ff4f87;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
    box-sizing:border-box;
}

#info{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#fff0f5;
    min-height:80px;
}

.flower-list{
    margin-top:20px;
}

.flower-list li{
    margin:8px 0;
}
</style>
</head>

<body>

<div class="box">

<h1>🌸 HOA NB 🌸</h1>

<input
type="text"
id="search"
placeholder="Nhập tên hoa hoặc tên thành viên..."
onkeyup="timHoa()">

<div id="info">
Nhập tên hoa hoặc tên thành viên để tìm kiếm.
</div>

</div>

<script>
const members = [
{
member: "Thư Thư",
flowers: [
"Mộc Lan Ngọc Ngà","Hồng Cecil Lam","Cá Heo Xanh","Cá Heo Hồng",
"Trái Tim Đá Quý","Ngót Nghẻo Hồng Phấn","Lan Vũ Nữ Cam","Trúc Đào Xanh",
"Tường Vi Hồng","Gấu Bông","Holly Vòng Xanh","Bụp Hồng Cận Hồng"
]
},
{
member: "Bongbong",
flowers: [
"Hoa Poppy Himalaya Xanh","Gấu Bông","Lạp Mai Đỏ","Dạ Yến Thảo Lam",
"Nhài Nhật","Trái Tim Đá Quý","Holly Vòng Xanh","Bụp Hồng Cận Hồng"
]
},
{
member: "Taman07",
flowers: [
"Mộc Lan Ngọc Ngà","Phù Dung Tím Hộp Báu","Đông Trùng Thông Vàng",
"Lạp Mai Đỏ","Gấu Bông","Holly Vòng Xanh","Bụp Hồng Cận Hồng",
"Dạ Yến Thảo Lam","Hoa Anh Thảo Xanh","Ngôi Sao Bethlehem",
"Địa Lan Trắng","Tường Vi Vàng"
]
}
];

function timHoa(){
const keyword = document.getElementById("search").value.trim().toLowerCase();
const info = document.getElementById("info");

if(keyword === ""){
info.innerHTML = "Nhập tên hoa hoặc tên thành viên để tìm kiếm.";
return;
}

// tìm thành viên
for(const m of members){
if(m.member.toLowerCase().includes(keyword)){
info.innerHTML =
"👤 <b>" + m.member + "</b><br><br>" +
"📌 Số hoa: " + m.flowers.length + "<br><br>" +
m.flowers.join("<br>");
return;
}
}

// tìm hoa
let result = [];

for(const m of members){
for(const f of m.flowers){
if(f.toLowerCase().includes(keyword)){
result.push(m.member);
break;
}
}
}

if(result.length > 0){
info.innerHTML =
"🌸 <b>Kết quả:</b><br>" +
result.join("<br>");
return;
}

info.innerHTML = "❌ Không tìm thấy";
}
</script>
}


</body>
</html>
