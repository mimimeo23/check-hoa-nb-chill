function searchData(){

let key = document.getElementById("search").value.toLowerCase().trim();
let box = document.getElementById("result");

if(!key){
box.innerHTML = "Nhập để tìm kiếm...";
return;
}

// tìm đúng tên
let found = members.find(m => m.name.toLowerCase() === key);

if(found){
box.innerHTML =
`<div class="member"><b>👤 ${found.name}</b><br><br>` +
found.flowers.map(f=>"🌸 "+f).join("<br>") +
"</div>";
return;
}

// tìm theo hoa
let list = [];

members.forEach(m=>{
m.flowers.forEach(f=>{
if(f.toLowerCase().includes(key)){
list.push(m.name);
}
});
});

let unique = [...new Set(list)];

box.innerHTML = unique.length
? "👥 Người sở hữu:<br>" + unique.join("<br>")
: "❌ Không tìm thấy";
}
