<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoa NB</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffd6e0;
    padding:20px;
}

.box{
    background:white;
    max-width:600px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#ff4f87;
}

input{
    width:100%;
    padding:10px;
    margin:15px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

li{
    cursor:pointer;
    margin:10px 0;
    font-size:20px;
}

li:hover{
    color:#ff4f87;
}

#info{
    margin-top:20px;
    padding:15px;
    background:#fff0f5;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>🌸 Hoa NB 🌸</h1>

<input
type="text"
id="search"
placeholder="Tìm tên hoa..."
onkeyup="timHoa()">

<h2>🌼 Danh sách hoa</h2>

<ul id="hoaList">
<li onclick="hienThongTin('Hoa hồng là biểu tượng của tình yêu.')">🌹 Hoa hồng</li>

<li onclick="hienThongTin('Hoa cúc tượng trưng cho sự trường thọ.')">🌼 Hoa cúc</li>

<li onclick="hienThongTin('Hoa ly mang ý nghĩa thanh cao.')">🤍 Hoa ly</li>

<li onclick="hienThongTin('Hoa hướng dương luôn hướng về mặt trời.')">🌻 Hoa hướng dương</li>

<li onclick="hienThongTin('Hoa lan tượng trưng cho sự sang trọng.')">💜 Hoa lan</li>
</ul>

<div id="info">
Bấm vào tên hoa để xem thông tin.
</div>

</div>

<script>

function hienThongTin(noidung){
document.getElementById("info").innerHTML=noidung;
}

function timHoa(){
let input=document.getElementById("search").value.toLowerCase();
let li=document.querySelectorAll("#hoaList li");

li.forEach(function(item){
if(item.textContent.toLowerCase().includes(input)){
item.style.display="";
}else{
item.style.display="none";
}
});
}

</script>

</body>
</html>
