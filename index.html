// ================= CLICK HOA =================
function showPeople(flower){
let result = members.filter(m => m.flowers.includes(flower)).map(m => m.name);

document.getElementById("people").innerHTML =
`<div class="people">
<b>🌸 ${flower}</b><br><br>
👥 ${result.join("<br>")}
</div>`;
}

// ================= SEARCH (2 CHIỀU) =================
function searchData(){
let key = document.getElementById("search").value.toLowerCase().trim();
let box = document.getElementById("result");

if(!key){
box.innerHTML = "Nhập để tìm kiếm...";
return;
}

// tìm theo tên
let found = members.find(m => m.name.toLowerCase().includes(key));

if(found){
box.innerHTML =
`<div class="member"><b>👤 ${found.name}</b><br><br>` +
found.flowers.map(f =>
`<span class="flower" onclick="showPeople('${f.replace(/'/g,"")}')">🌸 ${f}</span>`
).join("") +
`</div>`;
return;
}

// tìm theo hoa
let match = members.filter(m =>
m.flowers.some(f => f.toLowerCase().includes(key))
);

if(match.length){
box.innerHTML = match.map(m =>
`<div class="member">
<b>👤 ${m.name}</b><br><br>` +
m.flowers.map(f =>
`<span class="flower" onclick="showPeople('${f.replace(/'/g,"")}')">🌸 ${f}</span>`
).join("") +
`</div>`
).join("");
return;
}

box.innerHTML = "❌ Không tìm thấy";
}
