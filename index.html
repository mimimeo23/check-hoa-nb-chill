<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoa NB</title>

<style>
body{
    font-family: Arial;
    background:#ffd6e0;
    padding:20px;
}

.box{
    background:white;
    max-width:800px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#ff4f87;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    box-sizing:border-box;
    border-radius:10px;
    border:1px solid #ccc;
}

#info{
    padding:15px;
    background:#fff0f5;
    border-radius:10px;
    min-height:80px;
}
</style>
</head>

<body>

<div class="box">

<h1>🌸 HOA NB 🌸</h1>

<input id="search" type="text" placeholder="Nhập tên hoa hoặc thành viên..." onkeyup="timKiem()">

<div id="info">Nhập để tìm kiếm</div>

</div>

<script>

/* =========================
   DỮ LIỆU
========================= */
const members = [
{
member:"Thư Thư",
flowers:["Mộc Lan Ngọc Ngà","Hồng Cecil Lam","Cá Heo Xanh","Gấu Bông","Trái Tim Đá Quý"]
},
{
member:"Bongbong",
flowers:["Hoa Poppy Himalaya Xanh","Gấu Bông","Lạp Mai Đỏ","Nhài Nhật"]
},
{
member:"Bé Nhím",
flowers:["Ngân Hà Chiếu Nhuỵ","Trái Tim Đá Quý","Gấu Bông","Cừu Bông Ngọt Ngào"]
},
{
member:"Đại Ca H",
flowers:["Mộc Lan Ngọc Ngà","Hồng Cecil Lam","Gấu Bông","Ngôi Sao Bethlehem"]
}
];

/* =========================
   CHUẨN HOÁ (BỎ DẤU + THƯỜNG)
========================= */
function normalize(str){
return str
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.toLowerCase()
.trim();
}

/* =========================
   TÌM KIẾM
========================= */
function timKiem(){

const key = normalize(document.getElementById("search").value);
const info = document.getElementById("info");

if(key === ""){
info.innerHTML = "Nhập để tìm kiếm";
return;
}

/* ===== 1. tìm thành viên ===== */
for(const m of members){
if(normalize(m.member).includes(key)){
info.innerHTML =
"👤 <b>" + m.member + "</b><br><br>" +
m.flowers.join("<br>");
return;
}
}

/* ===== 2. tìm hoa ===== */
let result = [];

for(const m of members){
for(const f of m.flowers){
if(normalize(f).includes(key)){
result.push(m.member);
break;
}
}
}

if(result.length > 0){
info.innerHTML =
"🌸 <b>Thành viên có hoa:</b><br>" +
[...new Set(result)].join("<br>");
return;
}

info.innerHTML = "❌ Không tìm thấy";
}

</script>

</body>
</html>
