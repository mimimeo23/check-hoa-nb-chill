<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoa NB</title>

<style>
body{
    font-family: Arial;
    background:#ffd6e0;
    padding:20px;
}

.box{
    background:white;
    max-width:700px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#ff4f87;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

#info{
    padding:15px;
    background:#fff0f5;
    border-radius:10px;
    min-height:60px;
}
</style>
</head>

<body>

<div class="box">

<h1>🌸 HOA NB 🌸</h1>

<input id="search" type="text" placeholder="Nhập tên hoa hoặc thành viên..." onkeyup="timKiem()">

<div id="info">Nhập để tìm kiếm</div>

</div>

<script>

const members = [
{
member:"Thư Thư",
flowers:["Mộc Lan Ngọc Ngà","Hồng Cecil Lam","Gấu Bông"]
},
{
member:"Bongbong",
flowers:["Hoa Poppy Himalaya Xanh","Gấu Bông","Lạp Mai Đỏ"]
},
{
member:"Bé Nhím",
flowers:["Ngân Hà Chiếu Nhuỵ","Trái Tim Đá Quý","Gấu Bông"]
}
];

function timKiem(){

const key = document.getElementById("search").value.toLowerCase();
const info = document.getElementById("info");

if(key === ""){
info.innerHTML = "Nhập để tìm kiếm";
return;
}

/* ===== tìm thành viên ===== */
for(let m of members){
if(m.member.toLowerCase().includes(key)){
info.innerHTML = m.member + "<br>" + m.flowers.join("<br>");
return;
}
}

/* ===== tìm hoa ===== */
let result = [];

for(let m of members){
for(let f of m.flowers){
if(f.toLowerCase().includes(key)){
result.push(m.member);
break;
}
}
}

if(result.length > 0){
info.innerHTML = [...new Set(result)].join("<br>");
return;
}

info.innerHTML = "❌ Không tìm thấy";
}

</script>

</body>
</html>
