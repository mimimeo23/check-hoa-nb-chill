list.some(f=>f.toLowerCase().includes(k));

html+=`<div class="card">
<div class="name">${p}<span class="badge">${list.length} 🌸</span></div>`;

list.forEach(f=>{
html+=`<div class="item" onclick="showPopup('${p}','${f}')">

});

html+=`</div>`;
}
}
