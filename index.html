<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoa NB</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffd6e0;
    padding:20px;
}

.box{
    background:white;
    max-width:700px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#ff4f87;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

li{
    font-size:20px;
    margin:10px 0;
    cursor:pointer;
}

li:hover{
    color:#ff4f87;
}

#info{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#fff0f5;
}
</style>
</head>

<body>

<div class="box">

<h1>🌸 HOA NB 🌸</h1>

<input
type="text"
id="search"
placeholder="Nhập tên hoa..."
onkeyup="timHoa()">

<h3>Danh sách hoa</h3>

<ul>
<li onclick="hienThongTin('🌹 Hoa hồng<br>👤 Thành viên: Cún')">🌹 Hoa hồng</li>

<li onclick="hienThongTin('🌼 Hoa cúc<br>👤 Thành viên: Lan')">🌼 Hoa cúc</li>

<li onclick="hienThongTin('🤍 Hoa ly<br>👤 Thành viên: Mai')">🤍 Hoa ly</li>

<li onclick="hienThongTin('🌻 Hoa hướng dương<br>👤 Thành viên: An')">🌻 Hoa hướng dương</li>

<li onclick="hienThongTin('💜 Hoa lan<br>👤 Thành viên: Ngọc')">💜 Hoa lan</li>
</ul>

<div id="info">
Nhập tên hoa hoặc bấm vào tên hoa để xem thành viên.
</div>

</div>

<script>

const dsHoa = {
"hoa hồng":"🌹 Hoa hồng<br>👤 Thành viên: Cún",
"hoa cúc":"🌼 Hoa cúc<br>👤 Thành viên: Lan",
"hoa ly":"🤍 Hoa ly<br>👤 Thành viên: Mai",
"hoa hướng dương":"🌻 Hoa hướng dương<br>👤 Thành viên: An",
"hoa lan":"💜 Hoa lan<br>👤 Thành viên: Ngọc"
};

function timHoa(){
let text = document.getElementById("search").value.toLowerCase().trim();

if(dsHoa[text]){
document.getElementById("info").innerHTML = dsHoa[text];
}else if(text === ""){
document.getElementById("info").innerHTML =
"Nhập tên hoa hoặc bấm vào tên hoa để xem thành viên.";
}else{
document.getElementById("info").innerHTML =
"❌ Không tìm thấy hoa";
}
}

function hienThongTin(noidung){
document.getElementById("info").innerHTML = noidung;
}

</script>

</body>
</html>
