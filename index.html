function timHoa(){

const keyword = document.getElementById("search").value.trim().toLowerCase();
const info = document.getElementById("info");

if(!keyword){
info.innerHTML = "Nhập tên hoa hoặc thành viên để tìm kiếm.";
return;
}

// tìm thành viên
for(const m of members){
if(m.member.toLowerCase().includes(keyword)){
info.innerHTML =
"👤 <b>" + m.member + "</b><br><br>" +
m.flowers.join("<br>");
return;
}
}

// tìm hoa
let result = [];

for(const m of members){
for(const f of m.flowers){
if(f.toLowerCase().includes(keyword)){
result.push(m.member);
break;
}
}
}

if(result.length > 0){
info.innerHTML =
"🌸 <b>Người sở hữu:</b><br>" +
result.join("<br>");
return;
}

info.innerHTML = "❌ Không tìm thấy";
}
