<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoa NB</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffd6e0;
    padding:20px;
}

.box{
    background:white;
    max-width:800px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#ff4f87;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
    box-sizing:border-box;
}

#info{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#fff0f5;
    min-height:80px;
}

.flower-list{
    margin-top:20px;
}

.flower-list li{
    margin:8px 0;
}
</style>
</head>

<body>

<div class="box">

<h1>🌸 HOA NB 🌸</h1>

<input
type="text"
id="search"
placeholder="Nhập tên hoa hoặc tên thành viên..."
onkeyup="timHoa()">

<div id="info">
Nhập tên hoa hoặc tên thành viên để tìm kiếm.
</div>

</div>

<script>

const members = [
{
member: "Thư Thư",
flowers: [
"Mộc Lan Ngọc Ngà",
"Hồng Cecil Lam",
"Cá Heo Xanh",
"Cá Heo Hồng",
"Trái Tim Đá Quý",
"Ngót Nghẻo Hồng Phấn",
"Lan Vũ Nữ Cam",
"Trúc Đào Xanh",
"Tường Vi Hồng",
"Gấu Bông",
"Holly Vòng Xanh",
"Bụp Hồng Cận Hồng",
"Mao Lương Vàng Kem",
"Đông Trùng Thông Tím",
"Đông Trùng Thông Hồng",
"San Hô Cam",
"Hoa Hải Quỳ Hồng",
"Hoa Poppy Tím",
"Cúc Indo Cam",
"Phi Yến Hồng",
"Lồng Đèn Cam",
"Mạch Môn Sương Trắng",
"Hoa Sao Nhái Tím",
"Hoa Sao Nhái Hồng",
"Dạ Yến Thảo Lam",
"Hoa Anh Thảo Xanh",
"Hồng Champagne",
"Mạn Châu Sa",
"Ngôi Sao Bethlehem",
"Vạn Tuế Lá Lam",
"Hoa Anh Thảo Vàng",
"Địa Lan Trắng",
"Mạn Đà La"
]
},

member: "Bongbong",
flowers: [
"Hoa Poppy Himalaya Xanh",
"Gấu Bông",
"Lạp Mai Đỏ",
"Dạ Yến Thảo Lam",
"Nhài Nhật",
"Trái Tim Đá Quý",
"Holly Vòng Xanh",
"Bụp Hồng Cận Hồng"
],

member: "Taman07",
flowers: [
"Mộc Lan Ngọc Ngà",
"Phù Dung Tím Hộp Báu",
"Đông Trùng Thông Vàng",
"Lạp Mai Đỏ",
"Gấu Bông",
"Holly Vòng Xanh",
"Bụp Hồng Cận Hồng",
"Dạ Yến Thảo Xanh",
"Hoa Anh Thảo Xanh",
"Ngôi Sao Bethlehem",
"Địa Lan Trắng",
"Tường Vi Vàng"
],


function timHoa(){

const keyword = document
.getElementById("search")
.value
.trim()
.toLowerCase();

const info = document.getElementById("info");

if(keyword === ""){
info.innerHTML =
"Nhập tên hoa hoặc tên thành viên để tìm kiếm.";
return;
}

for(const member of members){

if(member.member.toLowerCase().includes(keyword)){
info.innerHTML =
"<h3>👤 " + member.member + "</h3>" +
"<p><b>Số hoa:</b> " + member.flowers.length + "</p>" +
"<div class='flower-list'>" +
member.flowers.join("<br>") +
"</div>";
return;
}

for(const flower of member.flowers){

if(flower.toLowerCase().includes(keyword)){
info.innerHTML =
"<h3>🌸 " + flower + "</h3>" +
"<p><b>Thành viên sở hữu:</b> " +
member.member +
"</p>";
return;
}

}
}

info.innerHTML = "❌ Không tìm thấy.";
}

</script>

</body>
</html>
